version: '3.8'

services:
  hotspot-website:
    build: .
    container_name: cross-border-hotspots
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./static:/app/static
      - ./templates:/app/templates
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
    restart: unless-stopped