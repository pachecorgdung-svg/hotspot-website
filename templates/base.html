<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}跨境电商热点追踪{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-fire"></i>
                <h1>跨境电商热点追踪</h1>
            </div>
            <nav class="nav">
                <a href="{{ url_for('index') }}" class="nav-link active">
                    <i class="fas fa-home"></i> 今日热点
                </a>
                <a href="{{ url_for('about') }}" class="nav-link">
                    <i class="fas fa-info-circle"></i> 关于
                </a>
                <a href="/api/hotspots/today" class="nav-link" target="_blank">
                    <i class="fas fa-code"></i> API
                </a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>跨境电商热点自动追踪系统 &copy; {{ now.year if now else '2024' }}</p>
            <p class="footer-info">
                <span><i class="fas fa-sync-alt"></i> 每天9:00自动更新</span>
                <span><i class="fas fa-database"></i> 数据来源：雨果网、新闻媒体、社交媒体</span>
                <span><i class="fas fa-code"></i> 技术栈：Python Flask + SQLite</span>
            </p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
